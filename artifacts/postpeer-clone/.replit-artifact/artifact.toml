kind = "web"
previewPath = "/"
title = "PostMVP"
version = "1.0.0"
id = "artifacts/postpeer-clone"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20225

[services.development]
run = "pnpm --filter @workspace/postpeer-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/postpeer-clone", "run", "build" ]
serve = "static"
publicDir = "artifacts/postpeer-clone/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20225"
BASE_PATH = "/"
